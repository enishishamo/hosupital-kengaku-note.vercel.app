<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12b080"/>
      <stop offset="100%" stop-color="#0a6e52"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5faf7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.18"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="180" fill="#ffffff" opacity="0.06"/>
  <circle cx="1100" cy="550" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- Left: clipboard icon -->
  <g transform="translate(80,135) scale(0.72)" filter="url(#shadow)">
    <rect x="0" y="20" width="288" height="330" rx="22" fill="url(#card)"/>
    <rect x="84" y="2" width="120" height="44" rx="14" fill="#0a8a68"/>
    <rect x="108" y="8" width="72" height="32" rx="9" fill="#ffffff" opacity="0.9"/>
    <circle cx="144" cy="24" r="10" fill="#0a8a68"/>
    <!-- medical cross -->
    <rect x="116" y="84" width="56" height="18" rx="9" fill="#0f8a6c"/>
    <rect x="135" y="65" width="18" height="56" rx="9" fill="#0f8a6c"/>
    <!-- stars -->
    <text x="30" y="210" font-size="52" fill="#f0c040" font-family="sans-serif">★</text>
    <text x="90" y="210" font-size="52" fill="#f0c040" font-family="sans-serif">★</text>
    <text x="150" y="210" font-size="52" fill="#f0c040" font-family="sans-serif">★</text>
    <text x="210" y="210" font-size="52" fill="#f0c040" font-family="sans-serif">★</text>
    <!-- text lines -->
    <rect x="30" y="232" width="228" height="12" rx="6" fill="#e0ede8"/>
    <rect x="30" y="260" width="180" height="12" rx="6" fill="#e0ede8"/>
    <rect x="30" y="288" width="204" height="12" rx="6" fill="#e0ede8"/>
  </g>

  <!-- Right: text -->
  <g transform="translate(380,200)">
    <text x="0" y="0" font-size="32" font-weight="500" fill="#ffffff" opacity="0.85" font-family="'Hiragino Sans', 'Yu Gothic', 'Zen Kaku Gothic New', sans-serif">医学生・初期研修医のための</text>
    <text x="0" y="80" font-size="68" font-weight="900" fill="#ffffff" font-family="'Hiragino Sans', 'Yu Gothic', 'Zen Kaku Gothic New', sans-serif" letter-spacing="-2">ドクたま</text>
    <text x="0" y="158" font-size="68" font-weight="900" fill="#ffffff" font-family="'Hiragino Sans', 'Yu Gothic', 'Zen Kaku Gothic New', sans-serif" letter-spacing="-2">病院見学ノート</text>
    <rect x="0" y="190" width="120" height="6" rx="3" fill="#f0c040"/>
    <text x="0" y="240" font-size="26" font-weight="500" fill="#ffffff" opacity="0.92" font-family="'Hiragino Sans', 'Yu Gothic', 'Zen Kaku Gothic New', sans-serif">8カテゴリで評価して、研修先を見える化</text>
  </g>

  <!-- Footer URL -->
  <text x="600" y="590" font-size="22" fill="#ffffff" opacity="0.65" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">hospital-visit-app.vercel.app</text>
</svg>
