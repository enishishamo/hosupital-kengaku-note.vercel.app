    /* ===== StarRating ===== */
    function StarRating({ value, onChange, readonly, small }) {
      const [hover, setHover] = useState(0);
      const size = small ? 13 : (readonly ? 16 : 22);
      return (
        <div style={{ display: "flex", gap: 1 }}>
          {[1,2,3,4,5].map(s => (
            <button key={s} type="button"
              onClick={() => !readonly && onChange(s)}
              onMouseEnter={() => !readonly && setHover(s)}
              onMouseLeave={() => setHover(0)}
              style={{
                background: "none", border: "none",
                cursor: readonly ? "default" : "pointer",
                fontSize: size, padding: 0, lineHeight: 1,
                color: s <= (hover || value) ? "#0f8a6c" : "#d1ddd8",
                transition: "color .12s, transform .12s",
                transform: !readonly && s <= hover ? "scale(1.25)" : "scale(1)",
              }}
            >★</button>
          ))}
        </div>
      );
    }

    /* ===== RadarChart ===== */
    function RadarChart({ ratings, size = 220, categories = CATEGORIES }) {
      const cx = size/2, cy = size/2, r = size * 0.33;
      const n = categories.length;
      const angle = i => Math.PI*2*i/n - Math.PI/2;
      const pt = (i, val) => ({
        x: cx + r*(val/5)*Math.cos(angle(i)),
        y: cy + r*(val/5)*Math.sin(angle(i)),
      });
      const values     = categories.map(c => ratings[c.key] || 0);
      const dataPoints = values.map((v,i) => pt(i,v));
      return (
        <svg viewBox={`0 0 ${size} ${size}`} style={{ width:"100%", maxWidth: size }}>
          {[1,2,3,4,5].map(lv => (
            <polygon key={lv}
              points={categories.map((_,i) => { const p=pt(i,lv); return `${p.x},${p.y}`; }).join(" ")}
              fill="none" stroke="#d1ddd8"
              strokeWidth={lv===5 ? 1.5 : 0.5} opacity={0.7}
            />
          ))}
          {categories.map((_,i) => {
            const p = pt(i,5);
            return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#d1ddd8" strokeWidth={0.5}/>;
          })}
          <polygon
            points={dataPoints.map(p=>`${p.x},${p.y}`).join(" ")}
            fill="rgba(15,138,108,0.18)" stroke="#0f8a6c" strokeWidth={2}
          />
          {dataPoints.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r={3} fill="#0f8a6c"/>)}
          {categories.map((c,i) => {
            const lr = r + 26;
            return (
              <text key={i}
                x={cx + lr*Math.cos(angle(i))}
                y={cy + lr*Math.sin(angle(i))}
                textAnchor="middle" dominantBaseline="central"
                style={{ fontSize: 9, fill: "#4a6358", fontFamily:"'Zen Kaku Gothic New',sans-serif" }}
              >{c.icon} {c.label}</text>
            );
          })}
        </svg>
      );
    }

    /* ===== HospitalCard ===== */
    function HospitalCard({ hospital, onClick, animDelay, weights, hasCustomWeights }) {
      const isInterested = hospital.status === "interested";
      const totalW = CATEGORIES.reduce((s,c) => s + (weights[c.key] > 0 ? weights[c.key] : 0), 0);
      const avg = totalW > 0
        ? CATEGORIES.reduce((s,c) => s + (hospital.ratings[c.key]||0)*(weights[c.key]>0?weights[c.key]:0), 0) / totalW
        : 0;
      const bgColor = avg >= 4
        ? "linear-gradient(135deg,#0f8a6c,#12a67e)"
        : avg >= 3 ? "linear-gradient(135deg,#2d9e80,#52b89a)"
        : "linear-gradient(135deg,#7a9489,#96afa5)";
      return (
        <div onClick={onClick}
          style={{
            background: isInterested ? "#fafdf9" : hospital.wantToRevisit ? "#f0faf6" : "#fff",
            borderRadius:16, padding:"18px 20px", cursor:"pointer",
            border: isInterested ? "1.5px dashed #a8c8b8" : hospital.wantToRevisit ? "1.5px solid #0f8a6c" : "1px solid #e4ece8",
            boxShadow:"0 1px 4px rgba(15,60,40,0.05)",
            transition:"all .22s cubic-bezier(.4,0,.2,1)",
            animation: `fadeUp .35s ease ${animDelay||0}s both`,
          }}
          onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(15,60,40,0.1)";}}
          onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 1px 4px rgba(15,60,40,0.05)";}}
        >
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                <div style={{ fontSize:16, fontWeight:700, color:"#1a2e24" }}>{hospital.name}</div>
                {isInterested && (
                  <span style={{ fontSize:10, fontWeight:700, color:"#7a9489", background:"#eef5f1", padding:"2px 7px", borderRadius:5, whiteSpace:"nowrap" }}>👀 気になる</span>
                )}
                {!isInterested && hospital.visitCount && (
                  <span style={{ fontSize:10, fontWeight:700, color:"#0f8a6c", background:"#eef5f1", padding:"2px 7px", borderRadius:5, whiteSpace:"nowrap" }}>{hospital.visitCount}</span>
                )}
                {!isInterested && hospital.visitPurpose && (
                  <span style={{ fontSize:10, fontWeight:600, color:"#7a9489", background:"#f5f8f6", padding:"2px 7px", borderRadius:5, whiteSpace:"nowrap" }}>{hospital.visitPurpose}</span>
                )}
              </div>
              <div style={{ fontSize:12, color:"#7a9489", marginTop:2 }}>
                {hospital.department}{hospital.department&&" · "}
                {isInterested ? "見学日未定" : hospital.date}
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0 }}>
              {isInterested ? (
                <div style={{ background:"linear-gradient(135deg,#c8d8d0,#a8b8b0)", color:"#fff", borderRadius:10, padding:"5px 10px", fontSize:11, fontWeight:700 }}>未見学</div>
              ) : (
                <div style={{ background:bgColor, color:"#fff", borderRadius:10, padding:"5px 11px", fontSize:14, fontWeight:800, minWidth:40, textAlign:"center", position:"relative" }}>
                  {avg.toFixed(1)}
                  {hasCustomWeights && <span style={{ fontSize:9, position:"absolute", top:-4, right:-4, background:"#f0c040", borderRadius:"50%", width:14, height:14, display:"flex", alignItems:"center", justifyContent:"center" }}>⚖</span>}
                </div>
              )}
              {hospital.rank > 0 && (
                <div style={{
                  fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:5, whiteSpace:"nowrap",
                  background: hospital.rank===1 ? "linear-gradient(135deg,#f0c040,#e8a820)"
                    : hospital.rank<=3 ? "linear-gradient(135deg,#0f8a6c,#12a67e)"
                    : "#eef5f1",
                  color: hospital.rank<=3 ? "#fff" : "#0f8a6c",
                }}>第{hospital.rank}志望</div>
              )}
              {hospital.wantToRevisit && (
                <div style={{ fontSize:11, fontWeight:700, color:"#0f8a6c", background:"#d6f0e8", padding:"2px 8px", borderRadius:5, whiteSpace:"nowrap" }}>🔁 再訪予定</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function EmailModal({ hospital, onClose }) {
      const [copied, setCopied] = useState(false);

      // 見学日を自然な表現に変換
      const visitDateLabel = (() => {
        if (!hospital.date) return "先日は";
        const d = new Date(hospital.date);
        const today = new Date(); today.setHours(0,0,0,0);
        const diff = Math.floor((today - d) / 86400000);
        if (diff === 0) return "本日は";
        if (diff === 1) return "昨日は";
        if (diff <= 7) return "先日は";
        return `${d.getMonth()+1}月${d.getDate()}日は`;
      })();

      // 良かった点・メモから印象的だった一文を自動生成
      const impressionLine = (() => {
        const src = [hospital.goodPoints, hospital.memo, hospital.askMemo].filter(Boolean).join(" ");
        if (!src.trim()) return `熱心に働くスタッフの皆様のお姿が非常に印象的であり、貴院での初期研修への気持ちがますます高まっているところです。`;
        // 最初の句点か改行で区切った最初の一文を抽出
        const first = src.split(/[。\n]/)[0].trim();
        const sentence = first.length > 5 && first.length <= 60 ? first : src.slice(0, 50).trim();
        return `特に、${sentence}という点が非常に印象的でした。貴院での初期研修への気持ちがますます高まっているところです。`;
      })();

      const template =
`件名：病院見学のお礼

${hospital.name} ${hospital.department || ""}
${hospital.thankYouDoctors || "（宛先を入力してください）"}

お世話になっております。
〇〇大学医学部◯年の〇〇〇〇です。

${visitDateLabel}お忙しい中、私のためにお時間を割いてくださり、誠にありがとうございました。

${hospital.department || "貴科"}の先生や研修医の先生に直接お話を聞くことができ、大変有意義な時間を過ごすことができました。

${impressionLine}

今後、より一層、学業および病院実習に励んでいく所存です。
まずは取り急ぎ、御礼申し上げます。

＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊
〇〇大学医学部◯年　〇〇　〇〇
E-mail : 〇〇〇〇@gmail.com
TEL : 〇〇〇-〇〇〇〇-〇〇〇〇
＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊`;

      const copy = () => {
        navigator.clipboard.writeText(template).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        }).catch(() => {
          // フォールバック
          const ta = document.createElement("textarea");
          ta.value = template;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        });
      };

      return (
        <div style={{
          position:"fixed", inset:0, background:"rgba(10,30,20,0.5)", zIndex:300,
          display:"flex", alignItems:"flex-end", justifyContent:"center",
          backdropFilter:"blur(5px)",
        }} onClick={onClose}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"#fff", borderRadius:"22px 22px 0 0", width:"100%", maxWidth:520,
            maxHeight:"88vh", overflowY:"auto", padding:"22px 20px 32px",
            animation:"fadeUp .3s ease",
          }}>
            <div style={{ width:36, height:4, borderRadius:2, background:"#d1ddd8", margin:"0 auto 16px" }}/>
            <div style={{ fontSize:16, fontWeight:900, color:"#1a2e24", marginBottom:12 }}>📧 お礼メールテンプレート</div>
            <div style={{ fontSize:12, color:"#7a9489", marginBottom:10 }}>〇〇の部分をご自身の情報に書き換えてください</div>
            <textarea readOnly value={template} rows={18}
              style={{
                width:"100%", padding:"12px 14px", borderRadius:10,
                border:"1px solid #d1ddd8", background:"#f5f8f6",
                fontSize:13, color:"#1a2e24", lineHeight:1.7, resize:"none",
              }}
            />
            <button onClick={copy} style={{
              width:"100%", marginTop:12, padding:"14px", borderRadius:12, border:"none",
              background: copied ? "#52b89a" : "linear-gradient(135deg,#0f8a6c,#12a67e)",
              color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer",
              transition:"background .3s",
            }}>
              {copied ? "✅ コピーしました！" : "📋 クリップボードにコピー"}
            </button>
          </div>
        </div>
      );
    }

    function App() {

      const [searchQ, setSearchQ]       = useState("");

        catch { return []; }
      });

        localStorage.setItem("scheduleEvents", JSON.stringify(scheduleEvents));
      }, [scheduleEvents]);
      const [customCategories, setCustomCategories] = useState(() => {
        try { return JSON.parse(localStorage.getItem("customCategories") || "[]"); }
        catch { return []; }
      });
      React.useEffect(() => {
        localStorage.setItem("customCategories", JSON.stringify(customCategories));
      }, [customCategories]);
      const allCategories = [...CATEGORIES, ...customCategories];
      const [packingChecks, setPackingChecks] = useState({});
      const DEFAULT_PACKING = [
        "💳 財布（ホテル代含む）","📱 携帯・充電器","👔 着替え・下着",
        "⏰ 目覚まし時計","🪪 身分証明書・学生証","🧴 洗顔グッズ",
        "🧥 白衣","🩺 聴診器","🖊️ 筆記用具・メモ帳",
        "💾 USB（過去問用）","⌚ 腕時計","🏷️ ネームプレート",
        "👗 着圧ソックス","🎒 セカンドバッグ","📱 iPad・タブレット",
      ];
      const [packingItems, setPackingItems] = useState(() => {
        try { return JSON.parse(localStorage.getItem("packingItems") || "null") || DEFAULT_PACKING; }
        catch { return DEFAULT_PACKING; }
      });
      React.useEffect(() => {
        localStorage.setItem("packingItems", JSON.stringify(packingItems));
      }, [packingItems]);
      const [weights, setWeights] = useState(() => {
        try { return JSON.parse(localStorage.getItem("byouin_weights") || "null") || {...DEFAULT_WEIGHTS}; }
        catch { return {...DEFAULT_WEIGHTS}; }
      });

      useEffect(() => {
        try { localStorage.setItem("byouin_weights", JSON.stringify(weights)); } catch {}
      }, [weights]);

      const hasCustomWeights = CATEGORIES.some(c => weights[c.key] !== 2);

      useEffect(() => {
        try { localStorage.setItem("byouin_v2", JSON.stringify(hospitals)); } catch {}
      }, [hospitals]);

      const avgRating = h => {
        const totalWeight = allCategories.reduce((s,c) => { const w=weights[c.key]??2; return s+(w>0?w:0); }, 0);
        if (totalWeight === 0) return 0;
        const weighted = allCategories.reduce((s,c) => { const w=weights[c.key]??2; return s+(h.ratings[c.key]||0)*(w>0?w:0); }, 0);
        return weighted / totalWeight;
      };

      const filtered = hospitals
        .filter(h => {
          const q = searchQ.toLowerCase();
          return (!q || h.name.toLowerCase().includes(q) || (h.department||"").toLowerCase().includes(q))
;
        })
        .sort((a,b) => {
          if (sortBy==="date")   return b.date.localeCompare(a.date);
          if (sortBy==="rating") return avgRating(b) - avgRating(a);
          return a.name.localeCompare(b.name);
        });


      const saveHospital = () => {
        if (!form.name.trim()) return;
        if (editId) {
          setHospitals(prev => prev.map(h => h.id===editId ? {...form, id:editId} : h));
        } else {

                              width:22, height:22, borderRadius:6, flexShrink:0, cursor:"pointer",
                              border: checked ? "none" : "2px solid #d1ddd8",
                              background: checked ? "#0f8a6c" : "transparent",
                              display:"flex", alignItems:"center", justifyContent:"center",
                            }}>
                              {checked && <span style={{ color:"#fff", fontSize:14, fontWeight:700 }}>✓</span>}
                            </div>
                            <span onClick={()=>setPackingChecks(prev=>({...prev, [i]:!prev[i]}))} style={{ fontSize:13, color: checked ? "#1a2e24" : "#4a6358", flex:1, cursor:"pointer" }}>{item}</span>
                            <button onClick={()=>{
                              const updated = packingItems.filter((_,j)=>j!==i);
                              setPackingItems(updated);
                            }} style={{ background:"none", border:"none", color:"#c8a0a0", fontSize:16, cursor:"pointer", padding:"2px 4px", lineHeight:1 }}>✕</button>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ display:"flex", gap:8, marginTop:10 }}>
                      <input
                        placeholder="＋ 項目を追加…"
                        onKeyDown={e=>{
                          if(e.key==="Enter" && e.target.value.trim()){
                            setPackingItems(prev=>[...prev, e.target.value.trim()]);
                            e.target.value="";
                          }
                        }}
                        style={{ flex:1, padding:"9px 12px", borderRadius:9, border:"1px solid #d1ddd8", fontSize:13, background:"#fff" }}
                      />
                      <button onClick={e=>{
                        const input = e.target.previousSibling;
                        if(input.value.trim()){ setPackingItems(prev=>[...prev, input.value.trim()]); input.value=""; }
                      }} style={{ padding:"9px 14px", borderRadius:9, border:"none", background:"#0f8a6c", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer" }}>追加</button>
                    </div>
                    <div style={{ fontSize:11, color:"#a8b8b0", textAlign:"center", marginTop:8 }}>
                      ※ チェックは毎回リセット。項目の変更は保存されます。
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
